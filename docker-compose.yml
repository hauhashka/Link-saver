services:
  db:
    image: postgres:16
    container_name: link_saver_db
    environment:
      POSTGRES_DB: link_saver
      POSTGRES_USER: link_saver_user
      POSTGRES_PASSWORD: link_saver_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: link_saver_api
    environment:
      DATABASE_URL: postgresql+psycopg://link_saver_user:link_saver_password@db:5432/link_saver
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data: